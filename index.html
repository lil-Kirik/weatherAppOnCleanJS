<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" sizes="256x256" href="/apple-touch-icon.png">
    
    <title>Wheather App</title>
</head>
<body>
    <div class="container">
        <div class="wheatherSearch">
            <input type="text" id="wheatherInput" data-type="wheatherInput" required>
            <button class="search">🔍</button>
        </div>
        <div class="wheather">
            <div class="titleWeather">
                <h1 class="cityName">-</h1>
                <img src="" alt="" class="img">
            </div>
            <div class="weatherFeel">
                <div class="wheatherToday">-</div>
                <div class="feel">Ощущается как <span class="feelValue"></span></div>
            </div>
            <div class="wheatherDesctiption">-</div>
            <div class="stats">
                <div class="stat">
                    <div class="imgStat">💧</div>
                    <div class="valueHumidity">-%</div>
                    <div class="titleStat">ВЛАЖНОСТЬ</div>
                </div>
                <div class="stat">
                    <div class="imgStat">🌬️</div>
                    <div class="valueWind">- м/с</div>
                    <div class="titleStat">ВЕТЕР</div>
                </div>
                <div class="stat">
                    <div class="imgStat">😳</div>
                    <div class="valueVisibility">- км</div>
                    <div class="titleStat">ВИДИМОСТЬ</div>
                </div>
            </div>
        </div>
        <div class="timing">
            <div class="sunrise">
                <div class="imgTiming">🌅</div>
                <div>
                    <div class="titleTiming">ВОСХОД</div>
                    <div class="valueTime sunriseTime">-</div>
                </div>
            </div>
            <div class="sunset">
                <div class="imgTiming">🌇</div>
                <div>
                    <div class="titleTiming">ЗАКАТ</div>
                    <div class="valueTime sunsetTime">-</div>
                </div>
            </div>
        </div>
        <div class="wheatherWeek">
            <div class="titleWeek">Прогноз на 5 дней</div>
            <div class="weatherWeek7"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
